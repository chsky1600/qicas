name: Tests
on:
  workflow_dispatch:
  pull_request:
    branches: [development, main]


jobs:
  test:
    name: bun tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: oven-sh/setup-bun@v2
    - run: bun install
    - run: |
        if [ -f tests/services/validatorService.test.ts ]; then
          bun test ./tests/services/validatorService.test.ts
        else
          echo "Test file not yet present on this branch, skipping"
        fi
