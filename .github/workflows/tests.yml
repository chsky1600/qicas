name: bun tests
on:
  workflow_dispatch:
  pull_request:
    branches: [development, main]


jobs:
  bun tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: oven-sh/setup-bun@v2
    - run: bun install
    - run: |
        if find . -path ./node_modules -prune -o \( -name '*.test.*' -o -name '*.spec.*' \) -print | grep -q .; then
          bun test
        else
          echo "No test files found, skipping"
        fi
