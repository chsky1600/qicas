name: Tests
on:
  workflow_dispatch:
  pull_request:
    branches: [development, main]


jobs:
  test:
    name: bun tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: oven-sh/setup-bun@v2
    - run: bun install
    - run: bun test tests/services/validatorService.test.ts